id: tts
name: Text-to-Speech (Pocket-TTS)
description: Local CPU text-to-speech generation via Pocket-TTS PyTorch model
category: providers
requires:
  - pocket-tts
  - scipy
config_keys:
  - key: tts.enabled
    required: true
    description: Enable text-to-speech
    type: boolean
  - key: tts.voice
    required: false
    description: TTS voice name (default alba)
    type: string
