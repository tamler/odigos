id: stt
name: Speech-to-Text (Moonshine)
description: Local CPU speech-to-text transcription via Moonshine ONNX models
category: providers
requires:
  - moonshine-voice
config_keys:
  - key: stt.enabled
    required: true
    description: Enable speech-to-text
    type: boolean
  - key: stt.model
    required: false
    description: Moonshine model size (tiny, small, medium)
    type: string
  - key: stt.language
    required: false
    description: Default language for transcription
    type: string
