agent:
  allow_external_evaluation: false
  description: ''
  max_tool_turns: 25
  name: Bob
  parent: null
  role: personal_assistant
  run_timeout_seconds: 300
api_key: odigos-dev-key
budget:
  daily_limit_usd: 5
  monthly_limit_usd: 50
  warn_threshold: 0.8
heartbeat:
  announce_interval_seconds: 60
  idle_think_interval: 900
  interval_seconds: 30
  max_todos_per_tick: 3
llm:
  background_model: deepseek/deepseek-v3.2
  base_url: https://openrouter.ai/api/v1
  connect_timeout_seconds: 10
  default_model: deepseek/deepseek-v3.2
  fallback_model: openai/gpt-5-nano
  max_tokens: 8192
  request_timeout_seconds: 60
  temperature: 0.7
sandbox:
  allow_network: false
  max_memory_mb: 512
  timeout_seconds: 5
server:
  host: 0.0.0.0
  port: 8000
